<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to COFE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
    background: url('../image/welcome-image.png') no-repeat center center fixed;
    background-size: cover;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    }
    .welcome-container {
      background:  #a87d5b;
      padding: 2.5rem 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .welcome-container h1 {
      color: #3f2a1d;
      margin-bottom: 1rem;
    }
    .welcome-container p {
      color: #555;
      margin-bottom: 2rem;
      font-size: 1.1rem;
    }
    .welcome-container a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #a87d5b;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .welcome-container a:hover {
      background: #8B4513;
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    
    <img src="../image/logo.png" alt="logo">
    <h1>Welcome to COFE!</h1>
    <p>Your favorite place for coffee and more.<br>
    Please log in or sign up to continue.</p>
    <a href="index1.html">Login</a>
    <br><br>
    <a href="index2.html" style="background:#eee;color:#a87d5b;border:1px solid #a87d5b;">Sign Up</a>
  </div>
</body>
</html>
