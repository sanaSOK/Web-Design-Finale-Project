<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6">Reset Password</h2>

    <!-- Email -->
    <input id="email" type="email" placeholder="Enter your email"
      class="w-full px-4 py-2 mb-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <!-- Old Password -->
    <input id="old-password" type="password" placeholder="Old password"
      class="w-full px-4 py-2 mb-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <!-- New Password -->
    <input id="new-password" type="password" placeholder="New password"
      class="w-full px-4 py-2 mb-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <!-- Confirm Password -->
    <input id="confirm-password" type="password" placeholder="Confirm new password"
      class="w-full px-4 py-2 mb-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />

    <!-- Button -->
    <button href="index1.html" onclick="resetPassword()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md mb-4">
      Change Password
    </button>

    <!-- Back to login -->
    <div class="text-center mb-2">
      <a href="index1.html" class="text-blue-600 underline text-sm">back to log in!</a>
    </div>

    <!-- Message -->
    <div id="message" class="text-center text-sm">
      <!-- Message will appear here -->
    </div>
  </div>

  <script>
    function resetPassword() {
      const email = document.getElementById("email").value.trim();
      const oldPass = document.getElementById("old-password").value;
      const newPass = document.getElementById("new-password").value;
      const confirmPass = document.getElementById("confirm-password").value;
      const messageBox = document.getElementById("message");

      if (email !== "sanasokitc2023@gmail.com") {
        messageBox.innerHTML = '<p class="text-red-600 mt-2"><span class="text-xl">❌</span> Email not found.</p>';
      } else if (!oldPass || !newPass || !confirmPass) {
        messageBox.innerHTML = '<p class="text-red-600 mt-2"><span class="text-xl">❌</span> Please fill in all fields.</p>';
      } else if (newPass !== confirmPass) {
        messageBox.innerHTML = '<p class="text-red-600 mt-2"><span class="text-xl">❌</span> Passwords do not match.</p>';
      } else {
        messageBox.innerHTML = '<p class="text-green-600 mt-2"><span class="text-xl">✅</span> Password changed successfully!</p>';
      }
    }
  </script>

</body>
</html>
