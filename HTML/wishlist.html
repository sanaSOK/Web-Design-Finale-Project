<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wishlist</title>
    <style>
        :root{ --brand:#a87d5b; --muted:#777; --bg:#faf8f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:#222; margin:0; padding:24px; }
        .container { max-width:1100px; margin: 0 auto; }
        .back { margin-bottom: 16px; display: inline-block; color:var(--muted); text-decoration:none; }
        .page-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
        .page-head h1{ margin:0; font-size:1.4rem; }

        .wishlist-grid{ display:grid; grid-template-columns: 1fr 320px; gap:20px; }
        .list{ background:#fff; border-radius:10px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,0.04); }
        .sidebar{ background:#fff; border-radius:10px; padding:18px; height:fit-content; box-shadow:0 6px 18px rgba(0,0,0,0.04); }

        .wishlist-item{ display:flex; gap:14px; align-items:center; padding:12px; border-bottom:1px solid #f0efee; }
        .wishlist-item:last-child{ border-bottom:none; }
        .wishlist-item img{ width:96px; height:96px; object-fit:cover; border-radius:8px; }
        .item-info{ flex:1; }
        .item-info h3{ margin:0 0 6px 0; font-size:1rem; }
        .item-meta{ color:var(--muted); font-size:0.95rem; display:flex; gap:8px; align-items:center; }
        .item-actions{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; }

        .btn{ background:var(--brand); color:#fff; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
        .btn.secondary{ background:#eee; color:#333; }
        .remove-btn{ background:transparent; color:#d65; border:1px solid rgba(214,65,65,0.08); padding:6px 10px; border-radius:6px; cursor:pointer; }

        .subtotal-row{ display:flex; justify-content:space-between; padding:8px 0; font-weight:600; }
        .empty{ text-align:center; color:var(--muted); padding:36px 12px; }

        @media(max-width:900px){ .wishlist-grid{ grid-template-columns: 1fr; } .sidebar{ order:2; } }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="index.html">← Back to Home</a>
        <h1>Your Wishlist</h1>
        <p>This is your wishlist. Add items here from the product listings by clicking the heart icon.</p>
        <div class="wishlist-grid">
            <div class="list">
                <div id="itemsList"></div>
            </div>
            <aside class="sidebar">
                <h3>Summary</h3>
                <div id="summaryArea">
                    <div class="subtotal-row"><div>Items:</div><div id="count">0</div></div>
                    <div class="subtotal-row"><div>Subtotal:</div><div id="subtotal">$0.00</div></div>
                    <div style="margin-top:12px; display:flex; gap:10px;">
                        <button id="clearBtn" class="btn secondary">Clear</button>
                    </div>
                </div>
            </aside>
        </div>

        <script>
            function formatPrice(v){ return '$' + (parseFloat(v)||0).toFixed(2); }

            function loadWishlist(){
                try{ return JSON.parse(localStorage.getItem('wishlist')||'[]'); }catch(e){ return []; }
            }

            function saveWishlist(arr){ localStorage.setItem('wishlist', JSON.stringify(arr)); }

            function renderWishlist(){
                const listEl = document.getElementById('itemsList');
                const wishlist = loadWishlist();
                listEl.innerHTML = '';

                if (!wishlist || wishlist.length === 0){
                    listEl.innerHTML = '<div class="empty">Your wishlist is empty.<br>Browse products and click the heart to add.</div>';
                    document.getElementById('count').textContent = '0';
                    document.getElementById('subtotal').textContent = formatPrice(0);
                    return;
                }

                wishlist.forEach(item =>{
                    const itemWrap = document.createElement('div');
                    itemWrap.className = 'wishlist-item';
                    const imgSrc = item.image || '../image/product.png';
                    itemWrap.innerHTML = `
                        <img src="${imgSrc}" alt="${item.name}" onerror="this.src='../image/product.png'">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <div class="item-meta">Price: <strong style="color:var(--brand); margin-left:6px;">${formatPrice(item.price)}</strong></div>
                        </div>
                        <div class="item-actions">
                            <input type="number" min="1" value="1" class="qty" style="width:64px;padding:6px;border-radius:6px;border:1px solid #eee;">
                            <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                                <button class="btn add-cart" data-id="${item.id}">Add to Cart</button>
                                <button class="remove-btn" data-id="${item.id}">Remove</button>
                            </div>
                        </div>
                    `;
                    listEl.appendChild(itemWrap);
                });

                // recalc summary
                const totalItems = wishlist.length;
                const subtotal = wishlist.reduce((s,i)=> s + (parseFloat(i.price)||0), 0);
                document.getElementById('count').textContent = totalItems;
                document.getElementById('subtotal').textContent = formatPrice(subtotal);

                // attach handlers
                document.querySelectorAll('.remove-btn').forEach(btn=>{
                    btn.addEventListener('click', (e)=>{
                        const id = parseInt(e.currentTarget.dataset.id);
                        let arr = loadWishlist(); arr = arr.filter(x=>x.id !== id); saveWishlist(arr); renderWishlist();
                    });
                });

                document.querySelectorAll('.add-cart').forEach((btn, idx)=>{
                    btn.addEventListener('click', (e)=>{
                        const id = parseInt(e.currentTarget.dataset.id);
                        const parent = e.currentTarget.closest('.wishlist-item');
                        const qtyInput = parent.querySelector('.qty');
                        const qty = Math.max(1, parseInt(qtyInput.value)||1);

                        // get wishlist item
                        const arr = loadWishlist();
                        const item = arr.find(x=>x.id === id);
                        if (!item) return;

                        // add to cart in localStorage (simple structure)
                        try{
                            const cartKey = 'cart';
                            let cart = JSON.parse(localStorage.getItem(cartKey) || '[]');
                            const existing = cart.find(c=>c.id === id);
                            if (existing) existing.quantity = (existing.quantity||0) + qty; else cart.push({...item, quantity: qty});
                            localStorage.setItem(cartKey, JSON.stringify(cart));
                        }catch(err){ console.error(err); }

                        // optionally remove from wishlist after adding
                        let newW = loadWishlist().filter(x=>x.id !== id); saveWishlist(newW); renderWishlist();
                        // show quick confirmation
                        e.currentTarget.textContent = 'Added'; setTimeout(()=> e.currentTarget.textContent = 'Add to Cart', 1200);
                    });
                });
            }

            document.addEventListener('DOMContentLoaded', ()=>{
                renderWishlist();

                document.getElementById('clearBtn').addEventListener('click', ()=>{
                    if (!confirm('Clear all items from wishlist?')) return; localStorage.removeItem('wishlist'); renderWishlist();
                });

                document.getElementById('checkoutBtn').addEventListener('click', ()=>{
                    // simple behavior: go to cart page if exists, else alert
                    if (localStorage.getItem('cart')){
                        // if there is a cart page or overlay in the project, you may navigate; here we fallback to index
                        window.location.href = 'index.html';
                    } else {
                        alert('Your cart is empty. Add items to cart first.');
                    }
                });
            });
        </script>
    </div>
</body>
</html>
